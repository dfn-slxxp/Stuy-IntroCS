{% load static %}
<!DOCTYPE html>
<html lang="en">

    <head>

        <meta charset="utf-8">
        <title>{% block title %}Minecraft Farm Directory{% endblock %}</title>
        <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

        <style>

            * {
                font-family: 'VT323', sans-serif;
                font-stretch: 150%;
                color: #ffffff;
            }

            body {
                text-align: center;
            }

            .navbar {
                position: sticky;
                top: 0;
                z-index: 40;
                border: 5px solid #51515187;
                font-size: 1rem;

                display: flex;
                align-items: center;
                justify-content: space-between;

                padding: 0 2rem;
                height: 72px;
                background-color: #0000002c;

                margin-bottom: 20px;
            }

            .content_wrappers {
                border: 5px solid #51515187;
                background-color: #0000002c;
                border-radius: 5px;
                margin-bottom: 20px;
                text-align: center;
                padding: 2rem;
                width: 35%;
            }

            .home-button {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .home-button h1 {
                color: #ffffffcc;
                font-size: 2rem;
                font-weight: 600;
                margin: 0;
                transition: color .2s;
                padding: 0.5rem;
            }

            .home-button h1:hover {
                color:#ffffff;
            }

            .home-button img {
                object-fit: contain;
            }

            .links a {
                color: #ffffffcc;
                text-decoration: none;
                font-size: 1.5rem;
                padding: .5rem .75rem;
                border-radius: 4px;
                transition: color .2s;
            }

            .links a:hover {
                color: #ffffff;
            }

            .content {
                text-align: center;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }

            .category_badge {
                display: inline-block;
                background-color: #51515187;
                border: 2px solid #ffffff44;
                border-radius: 4px;
                padding: 0.1rem 0.5rem;
                font-size: 1rem;
                margin: 0.2rem;
            }

            .content_wrappers table {
                margin: 0 auto;
            }

        </style>

        {% block moreStyles %}
        {% endblock %}

    </head>

    <body background="{% static  'Dirt.png' %}">

        <div class="navbar">

            <a href="/" class="home-button">
                <img id="site_logo" src="{% static 'image.png' %}" width="48px" height="48px" alt="website logo">
                <h1 id="site_name">Farm Discovery</h1>
            </a>

            <div class="links">

                <a href="/">About</a>
                <a href="/quiz/">Play the Quiz</a>
                <a href="/farms/">Farms</a>
                <a href="/add/">Add a Farm</a>

            </div>

        </div>

        <div class="content">

            <!--
            <div class="content_wrappers">
                <table>
                    <tr><td>Name</td></tr>
                    <tr><td>By: Author Name</td></tr>
                    <tr><td>Supports Version(s): 1.12+</td></tr>
                    <tr>
                        <td>
                            <span class="category_badge">Overworld Mobs</span>
                            <span class="category_badge">Blocks</span>
                        </td>
                    </tr>
                    <tr>
                        <td>
                            <img src="{% static 'tree.png' %}" width="50%">
                        </td>
                    </tr>
                </table>
            </div>
            -->

            {% endblock %}
